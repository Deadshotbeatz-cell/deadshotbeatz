<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEADSHOT BEATS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#e01a1a;--red-dark:#a01010;--red-glow:rgba(224,26,26,0.3);--black:#080808;--black2:#111111;--black3:#1a1a1a;--black4:#222222;--white:#f0f0f0;--grey:#888;--grey2:#555;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--black2);}::-webkit-scrollbar-thumb{background:var(--red);}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(224,26,26,0.15);}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--white);text-decoration:none;}
  .nav-logo span{color:var(--red);}
  .nav-links{display:flex;gap:36px;list-style:none;}
  .nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.2s;}
  .nav-links a:hover{color:var(--red);}
  .nav-cta{background:var(--red);color:var(--white)!important;padding:8px 20px;font-size:12px!important;}
  .nav-cta:hover{background:var(--red-dark)!important;}
  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 48px 80px;position:relative;overflow:hidden;}
  .hero::after{content:'DS';position:absolute;right:-60px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:480px;color:rgba(224,26,26,0.04);line-height:1;pointer-events:none;user-select:none;}
  .hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
  .hero-tag::before{content:'';display:block;width:32px;height:1px;background:var(--red);}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,12vw,160px);line-height:0.9;letter-spacing:4px;margin-bottom:32px;}
  .hero h1 span{color:var(--red);}
  .hero-sub{font-size:16px;color:var(--grey);font-weight:300;max-width:480px;line-height:1.7;margin-bottom:48px;}
  .btn-primary{background:var(--red);color:var(--white);border:none;padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
  .btn-primary:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 8px 24px var(--red-glow);}
  .btn-secondary{background:transparent;color:var(--white);border:1px solid var(--grey2);padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
  .btn-secondary:hover{border-color:var(--red);color:var(--red);}
  .hero-stats{display:flex;gap:48px;margin-top:72px;padding-top:48px;border-top:1px solid var(--black4);}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--red);line-height:1;}
  .stat-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-top:4px;}
  section{padding:100px 48px;}
  .section-header{display:flex;align-items:baseline;gap:20px;margin-bottom:48px;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;}
  .section-line{flex:1;height:1px;background:linear-gradient(to right,var(--red),transparent);}
  .section-count{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;color:var(--grey);}
  .filters{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
  .filter-btn{background:transparent;border:1px solid var(--black4);color:var(--grey);padding:7px 18px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--red);color:var(--red);background:rgba(224,26,26,0.05);}
  .beat-list{display:flex;flex-direction:column;gap:2px;}
  .beat-row{display:grid;grid-template-columns:40px 56px 1fr auto auto;align-items:center;gap:16px;padding:12px 20px;background:var(--black2);border:1px solid transparent;transition:all 0.2s;cursor:pointer;position:relative;overflow:hidden;}
  .beat-row:hover{background:var(--black3);border-color:rgba(224,26,26,0.2);}
  .beat-row.playing{background:var(--black3);border-color:rgba(224,26,26,0.3);}
  .beat-cover{width:44px;height:44px;background:var(--black4);position:relative;}
  .beat-cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--red);}
  .beat-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--white);}
  .beat-tag{background:var(--black4);color:var(--grey);font-size:10px;padding:2px 8px;text-transform:uppercase;}
  .beat-price{font-family:'Bebas Neue',sans-serif;font-size:22px;}
  .buy-btn{background:transparent;border:1px solid var(--red);color:var(--red);padding:6px 16px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;}
  .buy-btn:hover{background:var(--red);color:var(--white);}
  .share-btn{background:transparent;border:1px solid var(--grey2);color:var(--grey);padding:6px 10px;cursor:pointer;height:32px;width:32px;display:inline-flex;align-items:center;justify-content:center;}
  .share-btn:hover{border-color:var(--white);color:var(--white);}
  .sticky-player{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,10,0.97);border-top:1px solid var(--red);padding:0 48px;height:80px;display:flex;align-items:center;gap:32px;transform:translateY(100%);transition:transform 0.3s;}
  .sticky-player.visible{transform:translateY(0);}
  .player-controls{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .progress-bar{width:100%;max-width:500px;height:3px;background:var(--black4);cursor:pointer;position:relative;}
  .progress-fill{height:100%;background:var(--red);width:0%;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--black2);padding:40px;width:90%;max-width:500px;border:1px solid var(--black4);}
  .license-option{border:1px solid var(--black4);padding:15px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .license-option.selected{border-color:var(--red);background:rgba(224,26,26,0.1);}
  .eq-bars{display:flex;gap:2px;align-items:flex-end;height:12px;}
  .eq-bar{width:3px;background:var(--red);animation:pulse 0.8s infinite alternate;}
  @keyframes pulse{from{height:4px;}to{height:12px;}}
  @media(max-width:900px){.sticky-player{padding:0 20px;}.beat-price{display:none;}}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">DEAD<span>SHOT</span> BEATS</a>
  <ul class="nav-links">
    <li><a href="#beats">Beats</a></li>
    <li><a href="#licenses">Licenses</a></li>
    <li><a href="#contact" class="nav-cta">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-tag">Official Beat Store</div>
  <h1>DEAD<span>SHOT</span><br>BEATS</h1>
  <p class="hero-sub">Premium beats engineered for artists who don't miss. Dark, hard, uncompromising.</p>
  <div class="hero-actions">
    <a href="#beats" class="btn-primary">Browse Beats</a>
  </div>
  <div class="hero-stats">
    <div><div class="stat-num" id="hero-beat-count">—</div><div class="stat-label">Beats</div></div>
  </div>
</section>

<section id="beats">
  <div class="section-header">
    <div class="section-title">BEATS</div>
    <div class="section-line"></div>
    <div class="section-count" id="beats-shown">— TRACKS</div>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="trap">Trap</button>
    <button class="filter-btn" data-filter="drill">Drill</button>
  </div>
  <div class="beat-list" id="beat-list">Loading...</div>
</section>

<div class="sticky-player" id="sticky-player">
  <div class="player-info" style="min-width:200px">
    <div class="player-beat-name" id="player-name">—</div>
    <div class="player-beat-tag" id="player-tag">—</div>
  </div>
  <div class="player-controls">
    <button onclick="window._togglePlay()" style="background:var(--red);border:none;color:white;padding:10px 20px;cursor:pointer">PLAY/PAUSE</button>
    <div class="progress-bar" id="progress-bar" onclick="window._seek(event)"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-beat-name">License</h2>
    <div id="modal-options"></div>
    <button class="btn-primary" style="width:100%;margin-top:20px" onclick="window._proceed()">Checkout</button>
    <button onclick="document.getElementById('modal').classList.remove('open')" style="margin-top:10px;background:none;border:none;color:var(--grey);cursor:pointer">Close</button>
  </div>
</div>

<audio id="audio-player"></audio>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyB8P57XfDSlGkVrn3hTkKdB4YpfT435CYU",
  authDomain:"deadshot-beats.firebaseapp.com",
  projectId:"deadshot-beats",
  storageBucket:"deadshot-beats.firebasestorage.app",
  messagingSenderId:"252096563375",
  appId:"1:252096563375:web:58193b52e325147f592c5a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const BASE = 'https://pub-3a53df11fb5549bd97511bdef51a3c33.r2.dev/';

let beats = [], currentBeat = null, isPlaying = false, selectedLicense = 'mp3', currentBeatForModal = null;
const audio = document.getElementById('audio-player');

// ── RENDER BEATS ──
function renderBeats(filter = 'all') {
    const list = document.getElementById('beat-list');
    const filtered = filter === 'all' ? beats : beats.filter(b => (b.genre || '').toLowerCase() === filter);
    document.getElementById('beats-shown').textContent = filtered.length + ' TRACKS';

    list.innerHTML = filtered.map((b, i) => `
        <div class="beat-row ${currentBeat?.id === b.id ? 'playing' : ''}" onclick="window._playBeat('${b.id}')">
            <div class="beat-num">${currentBeat?.id === b.id ? '♫' : (i + 1)}</div>
            <div class="beat-cover"><div class="beat-cover-placeholder">DS</div></div>
            <div class="beat-info">
                <div class="beat-name">${b.name}</div>
                <div class="beat-meta"><span class="beat-tag">${b.genre || 'Beat'}</span></div>
            </div>
            <div class="beat-price">${b.price || '29'}€</div>
            <div class="beat-actions">
                <button class="share-btn" onclick="window._shareBeat(event, '${b.id}', '${b.name}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                </button>
                <button class="buy-btn" onclick="window._openBuyModal(event, '${b.id}')">BUY</button>
            </div>
        </div>
    `).join('');
}

// ── GLOBAL FUNCTIONS ──
window._playBeat = (id) => {
    const b = beats.find(x => String(x.id) === String(id));
    if (!b) return;
    if (currentBeat?.id === b.id) {
        window._togglePlay();
        return;
    }
    currentBeat = b;
    audio.src = BASE + b.file;
    audio.play();
    document.getElementById('player-name').textContent = b.name;
    document.getElementById('player-tag').textContent = b.genre || '';
    document.getElementById('sticky-player').classList.add('visible');
    renderBeats();
};

window._togglePlay = () => {
    if (audio.paused) audio.play(); else audio.pause();
};

window._seek = (e) => {
    const rect = document.getElementById('progress-bar').getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

// ── SHARE BUG FIX ──
window._shareBeat = async (e, id, name) => {
    e.stopPropagation();
    const url = window.location.origin + window.location.pathname + '?beat=' + id;
    const btn = e.currentTarget;

    if (navigator.share) {
        try {
            await navigator.share({ title: 'Deadshot Beats', text: 'Check out: ' + name, url: url });
        } catch (err) { console.log("Share failed"); }
    } else {
        await navigator.clipboard.writeText(url);
        const oldContent = btn.innerHTML;
        btn.innerHTML = '<span style="font-size:8px">COPY</span>';
        setTimeout(() => btn.innerHTML = oldContent, 2000);
    }
};

window._openBuyModal = (e, id) => {
    e.stopPropagation();
    currentBeatForModal = beats.find(x => String(x.id) === String(id));
    document.getElementById('modal-beat-name').textContent = currentBeatForModal.name;
    document.getElementById('modal-options').innerHTML = `
        <div class="license-option selected" onclick="window._sel(this, 'mp3')"><span>MP3 Lease</span> <span>29€</span></div>
        <div class="license-option" onclick="window._sel(this, 'wav')"><span>WAV Lease</span> <span>49€</span></div>
    `;
    document.getElementById('modal').classList.add('open');
};

window._sel = (el, type) => {
    document.querySelectorAll('.license-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedLicense = type;
};

// ── AUDIO EVENTS ──
audio.addEventListener('timeupdate', () => {
    const p = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress-fill').style.width = p + '%';
});

// ── INITIAL LOAD ──
async function load() {
    try {
        const snap = await getDocs(query(collection(db, 'beats'), orderBy('id')));
        beats = snap.docs.map(d => d.data());
        document.getElementById('hero-beat-count').textContent = beats.length;
        renderBeats();

        // Check for Shared Link
        const urlParams = new URLSearchParams(window.location.search);
        const sharedId = urlParams.get('beat');
        if (sharedId) {
            setTimeout(() => {
                document.getElementById('beats').scrollIntoView();
                window._playBeat(sharedId);
            }, 1000);
        }
    } catch (e) { console.error(e); }
}

load();
</script>
</body>
</html>
