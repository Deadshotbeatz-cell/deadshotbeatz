<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEADSHOT BEATS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#e01a1a;--red-dark:#a01010;--red-glow:rgba(224,26,26,0.3);--black:#080808;--black2:#111111;--black3:#1a1a1a;--black4:#222222;--white:#f0f0f0;--grey:#888;--grey2:#555;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--black2);}::-webkit-scrollbar-thumb{background:var(--red);}
  
  /* Navigation */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(224,26,26,0.15);}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--white);text-decoration:none;}
  .nav-logo span{color:var(--red);}
  .nav-links{display:flex;gap:36px;list-style:none;}
  .nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.2s;}
  .nav-links a:hover{color:var(--red);}

  /* Hero */
  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 48px 80px;position:relative;}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,12vw,160px);line-height:0.9;margin-bottom:32px;}
  .hero h1 span{color:var(--red);}

  /* Beats List */
  section{padding:100px 48px;}
  .beat-row{display:grid;grid-template-columns:40px 56px 1fr auto auto;align-items:center;gap:16px;padding:12px 20px;background:var(--black2);border:1px solid transparent;margin-bottom:2px;cursor:pointer;transition:0.2s;}
  .beat-row:hover{background:var(--black3);border-color:rgba(224,26,26,0.2);}
  .beat-row.playing{border-color:var(--red);background:var(--black3);}
  .beat-cover{width:44px;height:44px;background:var(--black4);display:flex;align-items:center;justify-content:center;color:var(--red);font-family:'Bebas Neue';}
  .beat-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;}
  .beat-tag{font-size:10px;background:var(--black4);padding:2px 8px;color:var(--grey);text-transform:uppercase;}
  
  /* Buttons */
  .buy-btn{background:transparent;border:1px solid var(--red);color:var(--red);padding:8px 20px;cursor:pointer;font-family:'Barlow Condensed';font-weight:700;}
  .buy-btn:hover{background:var(--red);color:white;}
  .share-btn{background:transparent;border:1px solid var(--grey2);color:var(--grey);width:36px;height:36px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:0.2s;}

  /* Player */
  .sticky-player{position:fixed;bottom:0;left:0;right:0;height:90px;background:rgba(10,10,10,0.98);border-top:2px solid var(--red);display:flex;align-items:center;padding:0 48px;z-index:1000;transform:translateY(100%);transition:0.3s;}
  .sticky-player.visible{transform:translateY(0);}
  .player-main{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .progress-container{width:100%;max-width:600px;display:flex;align-items:center;gap:15px;font-family:monospace;font-size:12px;}
  .progress-bar{flex:1;height:4px;background:var(--black4);cursor:pointer;position:relative;}
  .progress-fill{height:100%;background:var(--red);width:0%;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--black2);width:100%;max-width:500px;padding:30px;border:1px solid var(--black4);}
  .license-card{border:1px solid var(--black4);padding:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .license-card.active{border-color:var(--red);background:rgba(224,26,26,0.1);}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">DEAD<span>SHOT</span></a>
  <ul class="nav-links">
    <li><a href="#beats">Tracks</a></li>
    <li><a href="mailto:contact@deadshot.com">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>DEAD<span>SHOT</span><br>BEATS</h1>
  <div id="hero-beat-count" style="color:var(--red); font-family:'Bebas Neue'; font-size:24px;">0</div>
  <p style="color:var(--grey)">Premium Dark & Drill Productions</p>
</section>

<section id="beats">
  <div id="beat-list">Loading Beats...</div>
</section>

<div class="sticky-player" id="player">
  <div style="width:200px">
    <div id="p-name" class="beat-name">Track Name</div>
    <div id="p-genre" class="beat-tag">Genre</div>
  </div>
  <div class="player-main">
    <button onclick="window._toggle()" id="p-playbtn" style="background:var(--red); border:none; color:white; padding:8px 20px; cursor:pointer; font-weight:bold;">PAUSE</button>
    <div class="progress-container">
      <span id="p-current">0:00</span>
      <div class="progress-bar" id="p-bar" onclick="window._seek(event)"><div class="progress-fill" id="p-fill"></div></div>
      <span id="p-duration">0:00</span>
    </div>
  </div>
  <div style="width:200px; text-align:right">
     <button class="buy-btn" onclick="window._openModalWithCurrent()">BUY NOW</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="m-title" style="font-family:'Bebas Neue'; margin-bottom:20px;">License</h2>
    <div id="m-options"></div>
    <button onclick="window._checkout()" style="width:100%; background:var(--red); border:none; color:white; padding:15px; margin-top:20px; cursor:pointer; font-weight:bold;">CHECKOUT</button>
    <button onclick="document.getElementById('modal').classList.remove('open')" style="width:100%; background:none; border:none; color:var(--grey); margin-top:10px; cursor:pointer;">Close</button>
  </div>
</div>

<audio id="audio-el"></audio>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyB8P57XfDSlGkVrn3hTkKdB4YpfT435CYU",
  authDomain:"deadshot-beats.firebaseapp.com",
  projectId:"deadshot-beats",
  storageBucket:"deadshot-beats.firebasestorage.app",
  messagingSenderId:"252096563375",
  appId:"1:252096563375:web:58193b52e325147f592c5a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const STORAGE_BASE = 'https://pub-3a53df11fb5549bd97511bdef51a3c33.r2.dev/';

let beats = [], currentBeat = null, activeLic = 'mp3';

const LICENSES = [
  { id:'mp3', name:'MP3 LEASE', price:29.99 },
  { id:'wav', name:'WAV LEASE', price:49.99 },
  { id:'stems', name:'STEMS / TRACKOUT', price:99.99 },
  { id:'exclusive', name:'EXCLUSIVE', price:499.99 }
];

const audio = document.getElementById('audio-el');

// --- RENDER ---
function render() {
  const container = document.getElementById('beat-list');
  container.innerHTML = beats.map((b, i) => `
    <div class="beat-row ${currentBeat?.id === b.id ? 'playing' : ''}" onclick="window._play('${b.id}')">
      <div style="color:var(--grey)">${i+1}</div>
      <div class="beat-cover">DS</div>
      <div>
        <div class="beat-name">${b.name}</div>
        <span class="beat-tag">${b.genre || 'Beat'}</span>
      </div>
      <div style="font-family:'Bebas Neue'; font-size:20px;">${b.price || '29.99'}€</div>
      <div style="display:flex; gap:10px;">
        <button class="share-btn" onclick="window._share(event, '${b.id}')">SHARE</button>
        <button class="buy-btn" onclick="window._buy(event, '${b.id}')">ADD</button>
      </div>
    </div>
  `).join('');
}

// --- LOGIC ---
window._play = (id) => {
  const b = beats.find(x => String(x.id) === String(id));
  if(!b) return;
  if(currentBeat?.id === b.id) return window._toggle();

  currentBeat = b;
  audio.src = STORAGE_BASE + b.file;
  audio.play();
  
  document.getElementById('p-name').textContent = b.name;
  document.getElementById('p-genre').textContent = b.genre || 'Beat';
  document.getElementById('player').classList.add('visible');
  render();
};

window._toggle = () => {
  if(audio.paused) { audio.play(); document.getElementById('p-playbtn').textContent = 'PAUSE'; }
  else { audio.pause(); document.getElementById('p-playbtn').textContent = 'PLAY'; }
};

window._share = async (e, id) => {
  e.stopPropagation();
  const url = window.location.origin + window.location.pathname + '?beat=' + id;
  const btn = e.currentTarget;
  
  if(navigator.share) {
    try { await navigator.share({ title: 'Deadshot Beats', url: url }); } catch(e){}
  } else {
    await navigator.clipboard.writeText(url);
    btn.textContent = 'COPIED';
    setTimeout(() => btn.textContent = 'SHARE', 2000);
  }
};

window._buy = (e, id) => {
  e.stopPropagation();
  const b = beats.find(x => String(x.id) === String(id));
  window._openModal(b);
};

window._openModalWithCurrent = () => { if(currentBeat) window._openModal(currentBeat); };

window._openModal = (b) => {
  currentBeat = b; // Setze als aktiven Beat für Kauf
  document.getElementById('m-title').textContent = b.name;
  document.getElementById('m-options').innerHTML = LICENSES.map(l => `
    <div class="license-card ${activeLic === l.id ? 'active' : ''}" onclick="window._setLic('${l.id}')">
      <span>${l.name}</span>
      <strong>${l.price}€</strong>
    </div>
  `).join('');
  document.getElementById('modal').classList.add('open');
};

window._setLic = (id) => {
  activeLic = id;
  window._openModal(currentBeat);
};

window._seek = (e) => {
  const bar = document.getElementById('p-bar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
};

// --- AUDIO EVENTS ---
audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('p-fill').style.width = pct + '%';
  document.getElementById('p-current').textContent = formatTime(audio.currentTime);
  if(!isNaN(audio.duration)) document.getElementById('p-duration').textContent = formatTime(audio.duration);
});

function formatTime(s) {
  const min = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return min + ":" + (sec < 10 ? '0' : '') + sec;
}

// --- INIT ---
async function init() {
  const snap = await getDocs(query(collection(db, 'beats'), orderBy('id')));
  beats = snap.docs.map(d => d.data());
  document.getElementById('hero-beat-count').textContent = beats.length;
  render();

  // Check Share Link
  const urlId = new URLSearchParams(window.location.search).get('beat');
  if(urlId) {
    setTimeout(() => {
        window._play(urlId);
        document.getElementById('beats').scrollIntoView();
    }, 1000);
  }
}

init();
</script>
</body>
</html>
