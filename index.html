<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEADSHOT BEATS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#e01a1a;--red-dark:#a01010;--red-glow:rgba(224,26,26,0.3);--black:#080808;--black2:#111111;--black3:#1a1a1a;--black4:#222222;--white:#f0f0f0;--grey:#888;--grey2:#555;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--black2);}::-webkit-scrollbar-thumb{background:var(--red);}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
  
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(224,26,26,0.15);}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--white);text-decoration:none;}
  .nav-logo span{color:var(--red);}
  .nav-links{display:flex;gap:36px;list-style:none;}
  .nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.2s;}
  .nav-links a:hover{color:var(--red);}
  .nav-cta{background:var(--red);color:var(--white)!important;padding:8px 20px;font-size:12px!important;}

  .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 48px 80px;position:relative;overflow:hidden;}
  .hero::after{content:'DS';position:absolute;right:-60px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:480px;color:rgba(224,26,26,0.04);line-height:1;pointer-events:none;user-select:none;}
  .hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,12vw,160px);line-height:0.9;margin-bottom:32px;}
  .hero h1 span{color:var(--red);}
  .hero-sub{font-size:16px;color:var(--grey);max-width:480px;margin-bottom:48px;}
  
  .btn-primary{background:var(--red);color:var(--white);border:none;padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;text-decoration:none;}
  .btn-secondary{background:transparent;color:var(--white);border:1px solid var(--grey2);padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;text-decoration:none;}

  section{padding:100px 48px;}
  .section-header{display:flex;align-items:baseline;gap:20px;margin-bottom:48px;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;}
  .section-line{flex:1;height:1px;background:linear-gradient(to right,var(--red),transparent);}

  .beat-row{display:grid;grid-template-columns:40px 56px 1fr auto auto;align-items:center;gap:16px;padding:12px 20px;background:var(--black2);margin-bottom:2px;cursor:pointer;}
  .beat-cover{width:44px;height:44px;background:var(--black4);display:flex;align-items:center;justify-content:center;color:var(--red);font-family:'Bebas Neue';}
  .beat-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;}
  .beat-tag{background:var(--black4);color:var(--grey);font-size:10px;padding:2px 8px;}
  .buy-btn{background:transparent;border:1px solid var(--red);color:var(--red);padding:6px 16px;cursor:pointer;}
  .share-btn{background:transparent;border:1px solid var(--grey2);color:var(--grey);width:32px;height:32px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}

  .sticky-player{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,10,0.97);padding:0 48px;height:80px;display:none;align-items:center;gap:32px;border-top:1px solid var(--red);}
  .sticky-player.visible{display:flex;}
  .progress-bar{flex:1;height:4px;background:var(--black4);cursor:pointer;position:relative;}
  .progress-fill{height:100%;background:var(--red);width:0%;}

  .licenses-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px;}
  .license-card{background:var(--black2);border:1px solid var(--black4);padding:40px;text-align:center;}
  .license-card.featured{border-color:var(--red);}
  .lic-price{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--red);margin:20px 0;}

  .contact-section{display:grid;grid-template-columns:1fr 1fr;gap:80px;}
  input, textarea{background:var(--black3);border:1px solid var(--black4);padding:16px;color:white;width:100%;margin-bottom:10px;}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">DEAD<span>SHOT</span> BEATS</a>
  <ul class="nav-links">
    <li><a href="#beats">Beats</a></li>
    <li><a href="#licenses">Licenses</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>DEAD<span>SHOT</span><br>BEATS</h1>
  <div class="hero-stats">
    <div><div class="stat-num" id="hero-beat-count">0</div><div class="stat-label">Beats</div></div>
  </div>
</section>

<section id="beats">
  <div class="section-header"><div class="section-title">BEAT STORE</div><div class="section-line"></div></div>
  <div class="beat-list" id="beat-list">Loading...</div>
</section>

<section id="licenses" style="background:var(--black2);">
  <div class="section-header"><div class="section-title">LICENSING</div><div class="section-line"></div></div>
  <div class="licenses-grid">
    <div class="license-card"><h3>MP3 LEASE</h3><div class="lic-price">29€</div><p>High Quality MP3</p></div>
    <div class="license-card featured"><h3>WAV LEASE</h3><div class="lic-price">49€</div><p>WAV + MP3</p></div>
    <div class="license-card"><h3>STEMS</h3><div class="lic-price">99€</div><p>Full Trackouts</p></div>
    <div class="license-card"><h3>EXCLUSIVE</h3><div class="lic-price">INQUIRE</div><p>Full Ownership</p></div>
  </div>
</section>

<section id="contact" class="contact-section">
  <div class="contact-info"><h2>LET'S WORK.</h2></div>
  <div class="contact-form">
    <input type="text" placeholder="NAME"><input type="email" placeholder="EMAIL">
    <textarea placeholder="MESSAGE" rows="5"></textarea>
    <button class="btn-primary">Send</button>
  </div>
</section>

<div class="sticky-player" id="player">
  <div id="p-name" class="beat-name">Track</div>
  <button onclick="window._togglePlay()" id="p-play-btn" style="background:var(--red); border:none; color:white; padding:10px;">PLAY</button>
  <div class="progress-bar" onclick="window._seek(event)"><div class="progress-fill" id="p-fill"></div></div>
</div>

<audio id="main-audio"></audio>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB8P57XfDSlGkVrn3hTkKdB4YpfT435CYU",
  authDomain: "deadshot-beats.firebaseapp.com",
  projectId: "deadshot-beats",
  storageBucket: "deadshot-beats.firebasestorage.app",
  messagingSenderId: "252096563375",
  appId: "1:252096563375:web:58193b52e325147f592c5a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const STORAGE_BASE = 'https://pub-3a53df11fb5549bd97511bdef51a3c33.r2.dev/';

let beats = [], currentBeat = null;
const audio = document.getElementById('main-audio');

function renderBeats() {
  const list = document.getElementById('beat-list');
  list.innerHTML = beats.map((b, i) => `
    <div class="beat-row" onclick="window._playBeat('${b.id}')">
      <div style="color:var(--grey)">${i+1}</div>
      <div class="beat-cover">DS</div>
      <div class="beat-name">${b.name} <span class="beat-tag">${b.genre||'BEAT'}</span></div>
      <div class="beat-price">${b.price || '29'}€</div>
      <div style="display:flex; gap:10px;">
        <button class="share-btn" onclick="window._shareBeat(event, '${b.id}', '${b.name}')">SHR</button>
        <button class="buy-btn">BUY</button>
      </div>
    </div>
  `).join('');
}

window._playBeat = (id) => {
  const b = beats.find(x => String(x.id) === String(id));
  if(!b) return;
  if(currentBeat?.id === b.id) return window._togglePlay();
  currentBeat = b;
  audio.src = STORAGE_BASE + b.file;
  audio.play();
  document.getElementById('p-name').textContent = b.name;
  document.getElementById('player').classList.add('visible');
  document.getElementById('p-play-btn').textContent = 'PAUSE';
};

window._togglePlay = () => {
  if(audio.paused) { audio.play(); document.getElementById('p-play-btn').textContent = 'PAUSE'; }
  else { audio.pause(); document.getElementById('p-play-btn').textContent = 'PLAY'; }
};

window._seek = (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
};

// ── FIXED SHARE ──
window._shareBeat = async (e, id, name) => {
  e.stopPropagation();
  const url = window.location.origin + window.location.pathname + '?beat=' + id;
  if (navigator.share) {
    await navigator.share({ title: 'Deadshot Beats', text: name, url: url });
  } else {
    await navigator.clipboard.writeText(url);
    e.currentTarget.textContent = 'OK';
    setTimeout(() => e.currentTarget.textContent = 'SHR', 2000);
  }
};

audio.addEventListener('timeupdate', () => {
  document.getElementById('p-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
});

async function init() {
  const snap = await getDocs(query(collection(db, 'beats'), orderBy('id')));
  beats = snap.docs.map(d => d.data());
  document.getElementById('hero-beat-count').textContent = beats.length;
  renderBeats();
  const urlId = new URLSearchParams(window.location.search).get('beat');
  if(urlId) setTimeout(() => window._playBeat(urlId), 1000);
}
init();
</script>
</body>
</html>
