<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahlung erfolgreich — DEADSHOT BEATS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --red:#e01a1a; --black:#080808; --black2:#111111; --black4:#222222; --white:#f0f0f0; --grey:#888; --green:#22c55e; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body { background:var(--black); color:var(--white); font-family:'Barlow',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
  .check { width:80px; height:80px; border-radius:50%; background:rgba(34,197,94,0.1); border:2px solid var(--green); display:flex; align-items:center; justify-content:center; margin:0 auto 32px; font-size:36px; animation:pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
  @keyframes pop { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
  .title { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:4px; color:var(--green); margin-bottom:8px; animation:fadeUp 0.5s 0.2s ease both; }
  .subtitle { font-size:15px; color:var(--grey); margin-bottom:32px; animation:fadeUp 0.5s 0.3s ease both; line-height:1.7; max-width:440px; }
  .info-box { background:var(--black2); border:1px solid var(--black4); padding:24px 36px; margin-bottom:32px; animation:fadeUp 0.5s 0.4s ease both; }
  .info-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--grey); margin-bottom:8px; }
  .info-name { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; margin-bottom:4px; }
  .info-license { font-size:13px; color:var(--red); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  .note { font-size:13px; color:var(--grey); margin-bottom:36px; max-width:400px; line-height:1.7; animation:fadeUp 0.5s 0.5s ease both; }
  .btn { display:inline-block; background:var(--red); color:var(--white); border:none; padding:14px 36px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; text-decoration:none; transition:background 0.2s; animation:fadeUp 0.5s 0.6s ease both; }
  .btn:hover { background:#a01010; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; margin-bottom:48px; opacity:0.4; animation:fadeUp 0.5s ease both; }
  .logo span { color:var(--red); }
</style>
</head>
<body>
  <div class="logo">DEAD<span>SHOT</span> BEATS</div>
  <div class="check">✓</div>
  <div class="title">ZAHLUNG ERFOLGREICH</div>
  <div class="subtitle" id="subtitle">Deine Bestellung wurde bestätigt. Du erhältst in Kürze eine E-Mail mit dem Download-Link.</div>
  <div class="info-box" id="info-box">
    <div class="info-label">Gekaufter Beat</div>
    <div class="info-name" id="beat-name">—</div>
    <div class="info-license" id="beat-license">—</div>
  </div>
  <div class="note">📧 Check deine E-Mail für den Download-Link.<br>Bei Fragen: <a href="mailto:info@deadshotbeats.com" style="color:var(--red);">info@deadshotbeats.com</a></div>
  <a href="/" class="btn">← Zurück zum Store</a>

<script>
  const params = new URLSearchParams(window.location.search);
  const beat = params.get('beat');
  const license = params.get('license');
  const licenseNames = { mp3:'MP3 Lease', wav:'WAV Lease', trackout:'Trackout Lease', exclusive:'Exclusive Rights' };
  if (beat) document.getElementById('beat-name').textContent = beat;
  if (license) document.getElementById('beat-license').textContent = licenseNames[license] || license;
</script>
</body>
</html>
